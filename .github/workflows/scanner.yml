name: GG-Shot Signal Scanner

on:
  schedule:
    # Jalan setiap 15 menit
    - cron: "*/15 * * * *"
  workflow_dispatch:   # tombol "Run workflow" manual

# Hilangkan warning Node 20 deprecation (opt-in Node 24)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Restore scanner state (anti-spam)
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: ggshot-state-${{ github.run_id }}
          restore-keys: ggshot-state-

      - name: Restore outcome ledger (signal tracking)
        uses: actions/cache@v4
        with:
          path: bot_ledger.json
          key: ggshot-ledger-v2-${{ github.run_id }}
          restore-keys: ggshot-ledger-v2-

      - name: Run scanner once
        env:
          PYTHONUNBUFFERED: "1"
          DEBUG: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Kraken is US-based (GHA runners = AWS US). Fallback chain kicks in
          # automatically if the primary fails.
          EXCHANGE_ID: kraken
          MARKET_TYPE: auto
          FALLBACK_EXCHANGES: "kraken,mexc,bingx,bitget,coinbase"
          # Watchlist: BTC, ETH, BNB, SOL, PYTH (:USDT suffix auto-stripped on spot)
          WATCHLIST: "BTC/USDT:USDT,ETH/USDT:USDT,BNB/USDT:USDT,SOL/USDT:USDT,PYTH/USDT:USDT"
          TIMEFRAMES: "15m,30m,1h,4h"
          # ── Core indicator ──
          ATR_LENGTH: "10"
          ATR_MULT: "3.0"
          # ── Confluence filters (biar hanya ambil sinyal trend-aligned) ──
          USE_RSI_FILTER: "true"
          USE_MACD_FILTER: "true"
          MACD_FAST: "12"
          MACD_SLOW: "26"
          MACD_SIGNAL: "9"
          USE_EMA_FILTER: "false"
          EMA_LENGTH: "200"
          # ── Stop-loss: trend-line based (exit only when Supertrend flips) ──
          # Mode lain: "atr" (SL ketat ± sl_multiplier×ATR) | "max" (aman, mana yang lebih jauh)
          SL_MODE: "trendline"
          SL_BUFFER_ATR: "0.3"
          # Need enough history for EMA 200 + MACD warmup
          LOOKBACK: "500"
          # ── Bybit Auto-Trade (Testnet) ──
          EXECUTOR_ENABLED: ${{ secrets.EXECUTOR_ENABLED }}
          BYBIT_API_KEY: ${{ secrets.BYBIT_API_KEY }}
          BYBIT_API_SECRET: ${{ secrets.BYBIT_API_SECRET }}
          BYBIT_TESTNET: "true"
          ORDER_SIZE_USDT: "10"
          LEVERAGE: "10"
          MAX_POSITION_USDT: "100"
          MAX_CONCURRENT_POSITIONS: "5"
        run: python -m bot.scanner --once

      - name: Upload ledger artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-ledger
          path: bot_ledger.json
          if-no-files-found: ignore
