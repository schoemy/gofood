name: GG-Shot Signal Scanner

on:
  schedule:
    # Jalan setiap 15 menit
    - cron: "*/15 * * * *"
  workflow_dispatch:   # tombol "Run workflow" manual

# Hilangkan warning Node 20 deprecation (opt-in Node 24)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Restore scanner state (anti-spam)
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: ggshot-state-${{ github.run_id }}
          restore-keys: ggshot-state-

      - name: Diagnostic - smoke test
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python -c "import sys, ccxt, pandas, numpy; \
            print('Python:', sys.version.split()[0]); \
            print('ccxt:', ccxt.__version__); \
            print('pandas:', pandas.__version__); \
            print('numpy:', numpy.__version__)"
          python -c "import ccxt; \
            ex = ccxt.bybit({'options': {'defaultType': 'swap'}}); \
            ohlcv = ex.fetch_ohlcv('BTC/USDT:USDT', '30m', limit=5); \
            print('fetch_ohlcv OK, rows:', len(ohlcv), 'last close:', ohlcv[-1][4])"
          python -c "from bot.indicators import compute_supertrend, compute_rsi; \
            import pandas as pd, numpy as np; \
            n=100; idx=pd.date_range('2024-01-01',periods=n,freq='30min'); \
            c=100+np.cumsum(np.random.default_rng(0).normal(0,1,n)); \
            df=pd.DataFrame({'open':c,'high':c+1,'low':c-1,'close':c,'volume':1},index=idx); \
            print('supertrend OK:', compute_supertrend(df,10,3.0).iloc[-1].to_dict())"

      - name: Run scanner once
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Bybit dipakai karena Binance geoblock IP US (GitHub runner = US)
          EXCHANGE_ID: bybit
          # 'auto' → scanner akan pilih 'swap' untuk Bybit perp
          MARKET_TYPE: auto
          WATCHLIST: "BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT,PYTH/USDT:USDT"
          TIMEFRAMES: "30m,1h,4h"
          ATR_LENGTH: "10"
          ATR_MULT: "3.0"
          USE_RSI_FILTER: "true"
        run: python -m bot.scanner --once
